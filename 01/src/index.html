<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download server</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Download File</h1>
    
    <div class="input-group">
        <label for="sizeInput">Size (bytes):</label>
        <input type="number" id="sizeInput" value="100000000" max="10000000000">
    </div>

    <label for="statusInput">Status:</label>
    <input type="text" id="statusInput" readonly>
    
    <div id="progressBar">[                    ] 0%</div>
    
    <div class="buttons">
        <button id="xhrBtn">Download (XHR)</button>
        <button id="fetchBtn">Download (Fetch API)</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
